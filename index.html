<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gakman | Growth Architect</title>
    
    <!-- BROWSER TAB ICON -->
    <link rel="icon" type="image/png" href="tab-icon.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #000000; --accent: #ffffff; --device-border: #1a1a1a; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; }

        /* CENTERED NAVIGATION */
        nav { 
            position: fixed; top: 0; width: 100%; 
            padding: 2rem 5%; 
            display: flex; justify-content: center; 
            align-items: center; 
            z-index: 100; box-sizing: border-box; 
            pointer-events: none; 
        }

        .logo-frame {
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 20px;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 1;
            visibility: visible;
        }

        .header-logo { height: 120px; width: auto; display: block; }

        .logo-frame.hidden {
            opacity: 0;
            visibility: hidden;
            transform: translateY(-40px) scale(0.8);
        }

        .hero-section { height: 75vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 100px 10% 0 10%; }
        .hero-text h1 { font-size: clamp(3.5rem, 12vw, 9rem); margin: 0; font-weight: 900; letter-spacing: -5px; line-height: 0.8; text-transform: uppercase; }

        .work-section { padding: 50px 5% 100px 5%; text-align: center; }
        .phone-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 60px; margin-top: 50px; align-items: end; }
        .device-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; transition: 0.5s; }
        .device-wrapper:hover { transform: scale(1.03) translateY(-10px); z-index: 10; }

        .phone-device { width: 260px; height: 530px; background: #000; border: 10px solid var(--device-border); border-radius: 40px; position: relative; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .phone-device::before { content: ""; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 100px; height: 25px; background: var(--device-border); border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; z-index: 10; }

        .laptop-featured { grid-column: span 2; }
        .laptop-screen { width: 500px; height: 310px; background: #000; border: 12px solid var(--device-border); border-radius: 15px; position: relative; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .laptop-base { width: 560px; height: 12px; background: #333; border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; margin-top: -2px; }

        .slides-container { display: flex; width: 100%; height: 100%; transition: transform 0.5s ease-in-out; }
        .device-content { min-width: 100%; height: 100%; object-fit: cover; background: #111; }

        .arrow { position: absolute; top: 45%; width: 45px; height: 45px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; backdrop-filter: blur(5px); opacity: 0; transition: 0.3s; font-weight: bold; }
        .device-wrapper:hover .arrow { opacity: 1; }
        .arrow:hover { background: #fff; color: #000; }
        .arrow-left { left: -25px; }
        .arrow-right { right: -25px; }

        .device-label { margin-top: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; color: #888; }
        .cta-btn { background: #fff; color: #000; padding: 14px 24px; border-radius: 30px; text-decoration: none; font-weight: 900; font-size: 0.8rem; margin-top: 20px; display: inline-block; }

        footer { padding: 150px 10%; border-top: 1px solid #111; text-align: center; }
        .talk-title { font-size: clamp(2rem, 6vw, 4rem); font-weight: 900; letter-spacing: -2px; text-transform: uppercase; margin-bottom: 50px; }
        .footer-links-container { display: flex; justify-content: center; align-items: center; gap: 80px; flex-wrap: wrap; }
        .footer-icon-img { width: 220px; border-radius: 30px; filter: grayscale(1); transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .footer-icon-img:hover { transform: scale(1.15) rotate(5deg) translateY(-20px); filter: grayscale(0); box-shadow: 0 30px 60px rgba(255,255,255,0.2); }

        #email-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.4s ease; }
        #email-modal.active { opacity: 1; pointer-events: auto; }
        .modal-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 50px; border-radius: 40px; text-align: center; max-width: 500px; width: 90%; transform: scale(0.8); transition: 0.5s; }
        #email-modal.active .modal-card { transform: scale(1); }
        .modal-email-text { font-size: 1.8rem; font-weight: 900; margin-bottom: 20px; color: #fff; word-break: break-all; }
        .copy-btn { background: #fff; color: #000; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 900; cursor: pointer; }

        @media (max-width: 800px) { 
            .laptop-featured { grid-column: span 1; } .laptop-screen { width: 280px; height: 180px; } .laptop-base { width: 310px; } 
            .footer-icon-img { width: 150px; } .arrow { display: none; }
            .logo-frame { padding: 10px 20px; } .header-logo { height: 40px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="https://www.instagram.com/gakhs__/" target="_blank" style="text-decoration: none;">

                <div class="phone-device">

                <div class="phone-device">

            <div class="modal-email-text" id="email-val">dgiakhs@gmail.com</div>
            <button class="copy-btn" id="copy-btn" onclick="copyEmail()">COPY EMAIL</button>
            <div class="close-modal">Click anywhere to close</div>

    <script>
        // --- LOGO HIDE ON SCROLL ---
        window.addEventListener('scroll', function() {
            const frame = document.getElementById('logoFrame');
            if (window.scrollY > 50) { 
                frame.classList.add('hidden');
            } else {
                frame.classList.remove('hidden');
            }
        });

        // --- POPUP LOGIC ---
        function toggleModal() {
            document.getElementById('email-modal').classList.toggle('active');
            document.getElementById('copy-btn').innerText = "COPY EMAIL";
        }
        function copyEmail() {
            const email = document.getElementById('email-val').innerText;
            navigator.clipboard.writeText(email).then(() => {
                document.getElementById('copy-btn').innerText = "COPIED! ✅";
                setTimeout(toggleModal, 800);
            });
        }

        // --- DEVICE SLIDER LOGIC ---
        function moveSlide(arrowBtn, direction) {
            const wrapper = arrowBtn.closest('.device-wrapper');
            const container = wrapper.querySelector('.slides-container');
            const slides = container.querySelectorAll('.device-content');
            let currentIndex = parseInt(wrapper.getAttribute('data-index') || 0);
            
            currentIndex += direction;
            if (currentIndex >= slides.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = slides.length - 1;
            
            wrapper.setAttribute('data-index', currentIndex);
            container.style.transform = `translateX(-${currentIndex * 100}%)`;
            
            // Auto-play the video on the slide we just moved to
            const activeSlide = slides[currentIndex];
            if(activeSlide.tagName === 'VIDEO') {
                activeSlide.play();
            }
        }

        // --- GLOBAL AUTOPLAY & VIDEO LOGIC ---
        // This ensures all videos try to play as soon as the page is ready
        window.addEventListener('DOMContentLoaded', () => {
            const allVideos = document.querySelectorAll('video');
            allVideos.forEach(v => {
                v.play().catch(error => {
                    console.log("Browser blocked immediate autoplay, which is normal for some mobile settings.");
                });
            });
        });

        // Simplified Hover Logic (We removed the "pause on leave" so they keep playing)
        document.querySelectorAll('.device-wrapper').forEach(w => {
            w.addEventListener('mouseenter', () => {
                const slides = w.querySelectorAll('.device-content');
                const idx = parseInt(w.getAttribute('data-index') || 0);
                const active = slides[idx];
                if(active && active.tagName === 'VIDEO') active.play();
            });
            // REMOVED mouseleave pause logic to keep videos playing
        });

        // --- 3D BACKGROUND ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 4500; i++) { vertices.push(THREE.MathUtils.randFloatSpread(25), THREE.MathUtils.randFloatSpread(25), THREE.MathUtils.randFloatSpread(25)); }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const points = new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.015 }));
        scene.add(points);
        camera.position.z = 5;
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => { mouseX = (e.clientX - window.innerWidth / 2) / 300; mouseY = (e.clientY - window.innerHeight / 2) / 300; });
        function animate() {
            requestAnimationFrame(animate);
            points.rotation.x += 0.00012; points.rotation.y += 0.00012;
            camera.position.x += (mouseX - camera.position.x) * 0.025; camera.position.y += (-mouseY - camera.position.y) * 0.025;
            camera.lookAt(scene.position);
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
